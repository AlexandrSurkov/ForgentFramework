name: Spec versioning guard

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-version-bump:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify spec version bump on framework changes
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/check_spec_version_bump.sh
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          .github/scripts/check_spec_version_bump.sh "${BASE_SHA}" "${HEAD_SHA}"
